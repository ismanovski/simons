<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartphone Ansicht – Simonsbrotkörbchen</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ece8e1;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 1rem;
    }
    .phone {
      width: 390px;
      max-width: 100%;
      height: min(844px, 92vh);
      border: 12px solid #181818;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      background: #fff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
    .hint {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.65);
      color: #fff;
      border-radius: 999px;
      padding: .35rem .75rem;
      font-size: .8rem;
      letter-spacing: .01em;
    }
  </style>
</head>
<body>
  <div class="hint">Smartphone Vorschau (390×844)</div>
  <div class="phone" aria-label="Smartphone Ansicht">
    <iframe src="index.html" title="Simonsbrotkörbchen Smartphone Ansicht"></iframe>
  </div>
</body>
</html>
